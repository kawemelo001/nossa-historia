<!doctype html>
<html>
<head>
    <link href='https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css' rel='stylesheet'>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <title>Minha história de namoro</title>
    <style>
        body {
            background-color: #faf5f6;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        h1, .titulo-romantico {
            font-family: 'Dancing Script', cursive;
            font-size: 42px;
            color: #ff4757;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .foto-destaque img {
            max-width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* MURAL DE MADEIRA */
        .scroll-wrapper {
            height: 600vh; /* Aumentamos para a rolagem ficar bem lenta e controlada */
            position: relative;
            background-color: #3d2b1f;
            background-image: url('img/textura-madeira-quente.jpeg');
            background-size: cover;
            margin: 50px 0;
        }

        .scroll-sticky {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .scroll-content {
            display: flex;
            padding: 0;
            will-change: transform;
            
            /* A mágica acontece aqui: 
               A animação só vai de 0% a 100% do scroll da seção */
            animation: move-lateral linear both;
            animation-timeline: scroll(root);
            animation-range: contain 10% contain 90%; /* Dá 10% de folga no início e no fim */
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Cada card ocupa exatamente a largura da tela */
            min-width: 100vw; 
            position: relative;
        }

        .card img {
            width: 280px;
            height: 320px;
            object-fit: cover;
            background-color: white;
            padding: 15px 15px 80px 15px;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.4);
            border-radius: 2px;
            transform: rotate(-2deg);
        }

        .legenda {
            position: absolute;
            bottom: 20px;
            background-color: #fdfae1;
            padding: 15px 25px;
            color: #333;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
            text-align: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            min-width: 240px;
        }

        @keyframes move-lateral {
            from { transform: translateX(0); }
            /* Move exatamente a quantidade de fotos (8 fotos = 7 pulos de 100vw) */
            to { transform: translateX(-700vw); } 
        }

        /* AJUSTE DO PULL TO REFRESH */
        .trava-container { width: 100%; max-width: 300px; margin: 40px auto; }
        .trava-pista {
            width: 100%; height: 60px; background: #e0e0e0; border-radius: 30px;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .trava-botao {
            width: 50px; height: 50px; background: #ff4757; border-radius: 50%;
            position: absolute; left: 5px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 24px;
        }
        .liberado { background: #4cd137 !important; }
    </style>
</head>

<body>
    <div class="container">
        <div class="foto-destaque">
            <img src="./img/namorada/perfil.jpeg" alt="Perfil" />
        </div>
        <h1 class="titulo-romantico">Nossa História</h1>
        <p>Na vida as coisas são difíceis, mas com você tudo fica mais leve.</p>
    </div>

    <div class="scroll-wrapper">
        <div class="scroll-sticky">
            <div class="scroll-content">
                <div class="card">
                    <img src="./img/namorada/n1.jpg" alt="1">
                    <div class="legenda">O início de tudo...</div>
                </div>
                <div class="card"><img src="./img/namorada/n2.jpg" alt="2"><div class="legenda">Estava apaixonado...</div></div>
                <div class="card"><img src="./img/namorada/n3.jpg" alt="3"><div class="legenda">Nossa 1ª viagem juntos</div></div>
                <div class="card"><img src="./img/namorada/n4.jpeg" alt="4"><div class="legenda">Eu te amo muito</div></div>
                <div class="card"><img src="./img/namorada/n5.jpeg" alt="5"><div class="legenda">Estávamos felizes</div></div>
                <div class="card"><img src="./img/namorada/n6.jpeg" alt="6"><div class="legenda">Minha 1ª vez no The Best</div></div>
                <div class="card"><img src="./img/namorada/n7.jpeg" alt="7"><div class="legenda">Escolhi te amar</div></div>
                <div class="card"><img src="./img/namorada/n8.jpeg" alt="8"><div class="legenda">Nosso sorriso</div></div>
            </div>
        </div>
    </div>

    <div class="container">
        <p>Começamos juntos, vamos juntos até o fim.</p>
        <div class="trava-container">
            <div class="trava-pista">
                <div id="slider" class="trava-botao"><i class='bx bx-right-arrow-alt'></i></div>
                <span class="trava-texto">Arraste para abrir</span>
            </div>
        </div>
    </div>

    <script>
        const slider = document.getElementById('slider');
        const pista = document.querySelector('.trava-pista');
        let isDragging = false;
        let startX;

        const start = (e) => {
            isDragging = true;
            startX = (e.touches ? e.touches[0].clientX : e.clientX) - slider.offsetLeft;
        };

        const move = (e) => {
            if (!isDragging) return;
            let x = (e.touches ? e.touches[0].clientX : e.clientX) - startX;
            const limit = pista.offsetWidth - slider.offsetWidth - 5;
            if (x < 5) x = 5;
            if (x > limit) x = limit;
            slider.style.left = x + 'px';
            if (x >= limit) {
                slider.classList.add('liberado');
                setTimeout(() => { window.location.href = "historia.html"; }, 500);
            }
        };

        const end = () => {
            if (!slider.classList.contains('liberado')) slider.style.left = '5px';
            isDragging = false;
        };

        slider.addEventListener('mousedown', start);
        slider.addEventListener('touchstart', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move);
        window.addEventListener('mouseup', end);
        window.addEventListener('touchend', end);
    </script>
</body>
</html>
